<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:include="include :: head('微信公众号菜单')"></head>
<link rel="stylesheet" type="text/css" th:href="@{/css/wxMenu.css}"/>
<body style="background-color:#fff">
<div class="weixin-menu-setting" id="menu-container">
    <div class="mobile-menu-preview">
        <div class="mobile-head-title">公众号</div>
        <ul class="menu-list" id="menu-list">
            <li class="add-item extra" id="add-item">
                <a href="javascript:;" class="menu-link" title="添加菜单"><i class="weixin-icon add-gray"></i></a>
            </li>
        </ul>
        <small style="color: #FF5722;padding-left: 128px;position: absolute;bottom: -20px;">可直接拖动菜单排序</small>
    </div>
    <div class="weixin-body">
        <div class="weixin-content-wrap" style="display:none">
            <div class="weixin-content">
                <div class="item-info">
                    <form id="form-item" class="form-item" data-value="">
                        <div class="item-head">
                            <h4 id="current-item-name">添加子菜单</h4>
                            <div class="item-delete">
                                <a href="javascript:;" id="item_delete">删除菜单</a>
                            </div>
                        </div>
                        <div style="margin-top: 20px;">
                            <dl>
                                <dt id="current-item-option"><span class="is-sub-item">子</span>菜单标题：</dt>
                                <dd>
                                    <div class="input-box">
                                        <input id="item_title" name="item-title" type="text" value=""/>
                                    </div>
                                </dd>
                            </dl>
                            <dl class="is-item">
                                <dt id="current-item-type"><span class="is-sub-item">子</span>菜单内容：</dt>
                                <dd>
                                    <label for="type1" data-editing="1">
                                        <input id="type1" type="radio" name="type" value="click"/>
                                        <span class="lbl_content">发送消息</span>
                                    </label>
                                    <label for="type2" data-editing="1">
                                        <input id="type2" type="radio" name="type" value="view"/>
                                        <span class="lbl_content">跳转网页</span>
                                    </label>
                                </dd>
                            </dl>
                            <div id="menu-content" class="is-item">
                                <div class="viewbox is-view">
                                    <p class="menu-content-tips">点击该<span class="is-sub-item">子</span>菜单会跳到以下链接</p>
                                    <dl>
                                        <dt>页面地址：</dt>
                                        <dd>
                                            <div class="input-box"><input type="text" id="url" name="url"/></div>
                                        </dd>
                                    </dl>
                                </div>
                                <div class="clickbox is-click" style="display: none;">
                                    <input type="hidden" name="key" id="key" value=""/>
                                    <span class="create-click">
                                        <a href="javascript:void(0);" id="select-resources" style="margin-top: 30px;">
                                            <i class="weixin-icon big-add-gray"><strong>选择现有资源</strong></i>
                                        </a>
                                    </span>
                                    <span class="create-click" style="display: none;">
                                        <a href="javascript:void(0);" id="add-resources">
                                            <i class="weixin-icon big-add-gray"><strong>添加新资源</strong></i>
                                        </a>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="layui-btn-container" style="margin-top: 50px;text-align: center">
                <button class="layui-btn btn-primary layui-btn-radius" id="menuSave">保存</button>
                <button class="layui-btn btn-primary layui-btn-radius" id="menuSyn">发布</button>
            </div>
        </div>
        <div class="no-weixin-content">点击左侧菜单进行编辑操作</div>
    </div>
</div>
<script th:src="@{/js/Sortable.min.js}"></script>
<script type="text/javascript">
    layui.use(['jquery', 'layer', 'table', 'form'], function ($, layer, table, form) {
        // 微信菜单管理类
        var WechatMenuManager = (function () {
            function WechatMenuManager() {
                this.menu = null;
                this.responseData = null;
                this.init();
            }

            WechatMenuManager.prototype.init = function () {
                this.getWxMenuData();
            };

            WechatMenuManager.prototype.getWxMenuData = function () {
                var self = this;
                $.ajax({
                    url: '/admin/wx/menu/list', type: 'POST', dataType: 'json', success: function (result) {
                        if (result.mode) {
                            self.menu = result.data && result.data.button ? result.data.button : [];
                            self.responseData = result.data.news || [];
                        } else {
                            console.error("获取菜单数据失败:", result);
                            layer.msg("获取菜单数据失败：" + (result.msg || "未知错误"));
                        }
                        self.wxMenuInit();
                    },
                    error: function (error) {
                        console.error("请求菜单数据失败:", error);
                        layer.msg("请求菜单数据失败，请检查网络");
                        self.wxMenuInit();
                    }
                });
            };

            WechatMenuManager.prototype.wxMenuInit = function () {
                console.log("初始化菜单UI");
                // 扩展字符串方法
                String.prototype.subByte = function (start, bytes) {
                    for (var i = start; bytes > 0; i++) {
                        var code = this.charCodeAt(i);
                        bytes -= code < 256 ? 1 : 2;
                    }
                    return this.slice(start, i + bytes);
                };
                // 渲染菜单
                this.renderMenu();
                // 绑定所有事件
                this.bindEvents();
            };

            WechatMenuManager.prototype.renderMenu = function () {
                var menuData = this.menu || [];
                if (menuData.length == 0) {
                    console.log("没有菜单数据，只显示添加按钮");
                    return;
                }

                var items = menuData, str = '';

                items.forEach(function (item, i) {
                    var type = '', action = '', msgType = '';
                    if (!item.sub_button) {
                        type = item.type || '';
                        if (item.url) action = "url|" + item.url;
                        if (item.msgId) action = "key|" + item.msgId;
                        if (item.msgType) msgType = item.msgType;
                    }
                    // 构建主菜单 li
                    str +=
                        `<li id="menu-${i}" class="menu-item" data-type="${type}" data-msgtype="${msgType}" data-action="${action}" data-name="${item.name}">
    <a href="javascript:;" class="menu-link"><i class="icon-menu-dot"></i><i class="weixin-icon sort-gray"></i><span class="title">${item.name}</span></a>`;
                    // 构建子菜单
                    var subStr = '';
                    if (item.sub_button) {
                        item.sub_button.forEach(function (sub, j) {
                            var subType = sub.type || '';
                            var subAction = '';
                            var submsgType = sub.msgType || '';

                            if (sub.url) subAction = "url|" + sub.url;
                            if (sub.msgId) subAction = "key|" + sub.msgId;

                            subStr +=
                                `<li id="sub-menu-${j}" class="sub-menu-item" data-type="${subType}" data-msgtype="${submsgType}" data-action="${subAction}" data-name="${sub.name}">
    <a href="javascript:;"><i class="weixin-icon sort-gray"></i><span class="sub-title">${sub.name}</span></a>
</li>`;
                        });
                    }

                    // 子菜单容器
                    str +=
                        `    <div class="sub-menu-box" style="${i != 0 ? 'display:none;' : ''}">
        <ul class="sub-menu-list">
            ${subStr}
            <li class="add-sub-item"><a href="javascript:;" title="添加子菜单"><i class="weixin-icon add-gray"></i></a></li>
        </ul>
        <i class="arrow arrow-out"></i>
        <i class="arrow arrow-in"></i>
    </div>
</li>`;
                });

                $("#add-item").before(str);
                // 初始化拖拽排序
                this.initSortable();
            };

            WechatMenuManager.prototype.initSortable = function () {
                if (typeof Sortable !== 'undefined') {
                    // 主菜单拖拽
                    try {
                        new Sortable($("#menu-list")[0], {draggable: 'li.menu-item', onEnd: function () { console.log("菜单排序已改变"); }});
                        // 子菜单拖拽
                        $(".sub-menu-list").each(function () {
                            new Sortable(this, {draggable: 'li.sub-menu-item', onEnd: function () { console.log("子菜单排序已改变"); }});
                        });
                    } catch (e) {
                        console.error("初始化拖拽排序失败:", e);
                    }
                } else {
                    console.warn("Sortable 未加载");
                }
            };

            WechatMenuManager.prototype.bindEvents = function () {
                console.log("绑定事件");
                var self = this;
                // 添加主菜单
                $("#menu-container").off('click', '#add-item').on('click', '#add-item', function (e) {
                    e.preventDefault();
                    console.log("点击添加主菜单");
                    self.addMainMenu(this);
                    return false;
                });
                // 添加子菜单（使用事件委托）
                $("#menu-container").off('click', '.add-sub-item').on('click', '.add-sub-item', function (e) {
                    e.preventDefault();
                    console.log("点击添加子菜单");
                    self.addSubMenu(this);
                    return false;
                });
                // 菜单项点击
                $("#menu-container").off('click', '.menu-item, .sub-menu-item').on('click', '.menu-item, .sub-menu-item', function (e) {
                    e.preventDefault();
                    self.onMenuItemClick(this);
                    return false;
                });
                // 类型切换
                $("#menu-container").off('change', 'input[name=type]').on('change', 'input[name=type]', function () {
                    self.refreshType();
                });
                // 删除菜单
                $("#menu-container").off('click', '#item_delete').on('click', '#item_delete', function (e) {
                    e.preventDefault();
                    self.deleteMenuItem();
                });
                // 表单变化
                $("form#form-item").off('change', "input,textarea").on('change', "input,textarea", function () {
                    self.updateChangeMenu();
                });
                // 保存菜单
                $("#menu-container").off('click', "#menuSave").on('click', "#menuSave", function () {
                    self.saveMenu();
                });
                // 发布菜单
                $("#menu-container").off('click', "#menuSyn").on('click', "#menuSyn", function () {
                    self.syncMenu();
                });
                // 选择资源
                $("#menu-container").off('click', "#select-resources").on('click', "#select-resources", function (e) {
                    e.preventDefault();
                    self.selectResources();
                });
                // 初始化显示状态
                this.refreshType();
            };

            WechatMenuManager.prototype.addMainMenu = function (target) {
                var menu_item_total = $(".menu-item").length;
                if (menu_item_total >= 3) {
                    layer.msg("最多只能添加3个主菜单");
                    return;
                }

                var item =
                    `<li class="menu-item" data-type="click" data-action="key|" data-name="添加菜单" >
    <a href="javascript:;" class="menu-link">
        <i class="icon-menu-dot"></i> <i class="weixin-icon sort-gray"></i> <span class="title">添加菜单</span>
    </a>
    <div class="sub-menu-box" style="display:block;">
        <ul class="sub-menu-list">
            <li class="add-sub-item">
                <a href="javascript:;" title="添加子菜单"><i class="weixin-icon add-gray"></i><span></span></a>
            </li>
        </ul>
        <i class="arrow arrow-out"></i> <i class="arrow arrow-in"></i>
    </div>
</li>`;

                var itemDom = $(item);
                itemDom.insertBefore(target);
                itemDom.trigger("click");
                $(".sub-menu-box", itemDom).show();
                // 为新添加的菜单初始化拖拽
                if (typeof Sortable !== 'undefined') {
                    try {
                        new Sortable($(".sub-menu-list", itemDom)[0], {draggable: 'li.sub-menu-item'});
                    } catch (e) {
                        console.error("初始化子菜单拖拽失败:", e);
                    }
                }
            };

            WechatMenuManager.prototype.addSubMenu = function (target) {
                var sub_menu_item_total = $(target).parent().find(".sub-menu-item").length;
                if (sub_menu_item_total >= 5) {
                    layer.msg("最多只能添加5个子菜单");
                    return;
                }
                var item =
                    `<li class="sub-menu-item" data-type="click" data-action="key|" data-name="添加子菜单">
    <a href="javascript:;"><i class="weixin-icon sort-gray"></i><span class="sub-title">添加子菜单</span></a>
</li>`;

                var itemDom = $(item);
                itemDom.insertBefore(target);
                itemDom.trigger("click");
                if (sub_menu_item_total == 4) {
                    $(target).hide();
                }
            };

            WechatMenuManager.prototype.onMenuItemClick = function (item) {
                // 移除所有高亮
                $("#menu-list li").removeClass('current');
                $(item).addClass('current');

                var type = $(item).attr('data-type');
                var action = $(item).attr('data-action');
                var title = $(item).attr('data-name');
                console.log("点击菜单: " + title);
                var msgType = $(item).attr('data-msgtype');
                // 显示子菜单或主菜单逻辑
                if ($(item).hasClass("sub-menu-item")) {
                    $(".is-item, .is-sub-item").show();
                } else { // 主菜单
                    $("#menu-list > li").not(item).find(".sub-menu-box").hide();
                    $(".sub-menu-box", item).toggle();
                    if ($(".sub-menu-item", item).length == 0) {
                        $(".is-item, .is-sub-item").show();
                    } else {
                        $(".is-item, .is-sub-item").hide();
                    }
                }
                // 填充表单
                var actions = action.split('|');
                $("input[name=type][value='" + type + "']").prop("checked", true);
                $("input[name='item-title']").val(title);
                $('#current-item-name').text(title);

                $("input[name='" + actions[0] + "']").val(actions[1]);
                if (actions[0] == 'url') $('input[name=key]').val('');
                if (actions[0] == 'key') {
                    $('input[name=url]').val('');
                    var cont = $(".is-click .create-click:first");
                    $(".keyTitle", cont).remove();
                    if (actions[1]) {
                        var msg = this.getMsgByIdAndType(actions[1], msgType);
                        var keyTitle = msg.title ? msg.title : '无标题';
                        cont.append('<div class="keyTitle">资源名:' + keyTitle + '</div>');
                    }
                }
                // 显示编辑区域
                $(".weixin-content-wrap").show();
                $(".no-weixin-content").hide();
                // 刷新表单 & 类型
                form.render();
                this.refreshType();
            };

            WechatMenuManager.prototype.refreshType = function () {
                if ($('input[name=type]:checked').val() == 'view') {
                    $(".is-view").show();
                    $(".is-click").hide();
                } else {
                    $(".is-view").hide();
                    $(".is-click").show();
                }
            };

            WechatMenuManager.prototype.getMsgByIdAndType = function (mid, mtype) {
                var d = {};
                if (this.responseData) {
                    $.each(this.responseData, function (_, v) {
                        if (v.id == mid && v.msgType == mtype) {
                            d = v;
                            return false;
                        }
                    });
                }
                return d;
            };

            WechatMenuManager.prototype.updateChangeMenu = function () {
                var title = $("input[name='item-title']").val();
                var type = $("input[name='type']:checked").val();
                var key = type == 'view' ? 'url' : 'key';
                var value = $("input[name='" + key + "']").val();
                var msgType = $("input[name='" + key + "']").attr("data-msgtype");

                if (key == 'key' && value) {
                    var msg = this.getMsgByIdAndType(value, msgType);
                    var keyTitle = msg.title ? msg.title : '无标题';
                    var cont = $(".is-click .create-click:first");
                    $(".keyTitle", cont).remove();
                    cont.append('<div class="keyTitle">资源名:' + keyTitle + '</div>');
                }

                var currentItem = $("#menu-list li.current");
                if (currentItem.length > 0 && title) {
                    currentItem.attr('data-type', type);
                    currentItem.attr('data-msgtype', msgType);
                    currentItem.attr('data-action', key + "|" + value);
                    // 更新显示标题
                    var titleElement = currentItem.children("a").find(".title, .sub-title");
                    if (titleElement.length) {
                        titleElement.text(title.subByte(0, 16));
                    }
                    currentItem.attr('data-name', title);
                    $('#current-item-name').text(title);
                }
            };

            WechatMenuManager.prototype.getMenuList = function () {
                var menus = [], sub_button = [];
                var menu_i = 0, sub_menu_i = 0;

                $("#menu-list li").each(function (i) {
                    var item = $(this);
                    var name = item.attr('data-name');
                    var type = item.attr('data-type');
                    var action = item.attr('data-action');
                    var msgType = item.attr('data-msgtype');

                    if (name) {
                        var actions = action ? action.split('|') : ['', ''];
                        if (item.hasClass('menu-item')) {
                            sub_menu_i = 0;
                            if (item.find('.sub-menu-item').length > 0) {
                                menus[menu_i] = {"name": name, "sub_button": "sub_button"};
                            } else {
                                if (actions[0] == 'url')
                                    menus[menu_i] = {"name": name, "type": type, "url": actions[1]};
                                else
                                    menus[menu_i] = {"name": name, "type": type, "msgId": actions[1], "msgType": msgType};
                            }
                            if (menu_i > 0 && menus[menu_i - 1] && menus[menu_i - 1]['sub_button'] == "sub_button") {
                                menus[menu_i - 1]['sub_button'] = sub_button;
                            }
                            sub_button = [];
                            menu_i++;
                        } else if (item.hasClass('sub-menu-item')) {
                            if (actions[0] == 'url')
                                sub_button[sub_menu_i++] = {"name": name, "type": type, "url": actions[1]};
                            else
                                sub_button[sub_menu_i++] = {"name": name, "type": type, "msgId": actions[1], "msgType": msgType};
                        }
                    }
                });

                if (sub_button.length > 0 && menus.length > 0) {
                    menus[menus.length - 1]['sub_button'] = sub_button;
                }

                return menus;
            };

            WechatMenuManager.prototype.deleteMenuItem = function () {
                var current = $("#menu-list li.current");
                if (current.length == 0) {
                    return;
                }

                var prev = current.prev("li[data-type]");
                var next = current.next("li[data-type]");
                var last = null;

                if (prev.length == 0 && next.length == 0 && $(".sub-menu-box", current).length == 0) {
                    last = current.closest(".menu-item");
                } else if (prev.length > 0 || next.length > 0) {
                    last = prev.length > 0 ? prev : next;
                } else {
                    $(".weixin-content-wrap").hide();
                    $(".no-weixin-content").show();
                }

                current.remove();

                if (last && last.length) {
                    last.trigger('click');
                } else {
                    $("input[name='item-title']").val('');
                    $(".weixin-content-wrap").hide();
                    $(".no-weixin-content").show();
                }
            };

            WechatMenuManager.prototype.saveMenu = function () {
                var menus = this.getMenuList();
                if (menus.length == 0) {
                    layer.msg("请至少添加一个菜单");
                    return;
                }
                $.ajax({
                    url: '/admin/wx/menu/save', type: 'POST', data: {"menus": JSON.stringify(menus)}, dataType: 'json', success: function (result) {
                        if (result.mode) {
                            layer.msg("菜单保存成功，请点击同步按钮到微信官网！", {icon: 1});
                        } else {
                            layer.msg("菜单保存失败：" + (result.msg || "未知错误"), {icon: 2});
                        }
                    },
                    error: function (error) {
                        console.error("保存菜单失败:", error);
                        layer.msg("菜单保存失败，请检查网络", {icon: 2});
                    }
                });
            };

            WechatMenuManager.prototype.syncMenu = function () {
                $.ajax({
                    url: '/wxapi/doPublishMenu', type: 'POST', data: {}, dataType: 'json', success: function (result) {
                        if (result.errcode == 0) {
                            layer.msg("菜单同步更新成功，生效时间看微信官网说明，或者重新关注微信号！", {icon: 1});
                        } else {
                            layer.msg("菜单同步失败：" + (result.msg || "未知错误"), {icon: 2});
                        }
                    },
                    error: function (error) {
                        console.error("同步菜单失败:", error);
                        layer.msg("菜单同步失败，请检查网络", {icon: 2});
                    }
                });
            };

            WechatMenuManager.prototype.selectResources = function () {
                editView('/admin/wx/menu/ventu', '发送消息');
            };

            WechatMenuManager.prototype.refreshKey = function (data) {
                $("input[name=key]").val(data.id).attr("data-msgtype", data.msgType).trigger("change");
                this.updateChangeMenu();
            };

            return WechatMenuManager;
        })();

        // 页面加载完成后初始化菜单管理器
        $(document).ready(function () {
            console.log("页面加载完成，初始化微信菜单管理器");
            window.wechatMenuManager = new WechatMenuManager();
        });
    });
</script>
</body>
</html>
