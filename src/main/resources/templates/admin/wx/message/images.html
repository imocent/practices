<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:include="include :: head('编辑')"></head>
<body style="background-color:#fff">
<div class="yadmin-body animated fadeIn">
    <div class="layui-col-md2 layui-card">
        <div class="layui-card-body">
            <img id="thumbImg" th:src="${bean?.url?:'/images/default.png'}" width="200" height="200" referrerPolicy="no-referrer"/>
            <p id="thumbTxt" style="padding-top:5px">请输入标题</p>
        </div>
    </div>
    <div class="layui-col-md10 layui-form">
        <div class="wx-form-lg" id="add_form" style="overflow: hidden;" data-t="1">
            <input type="hidden" name="id" th:value="${bean?.id}"/>
            <input type="hidden" id="msgType" name="msgType" value="image"/>
            <input type="hidden" id="mediaId" name="mediaId" th:value="${bean?.mediaId}"/>
            <div class="layui-form-item">
                <label class="layui-form-label"><i class="yadmin-red">* </i>标题</label>
                <div class="layui-input-block">
                    <input type="text" name="title" id="title" th:value="${bean?.title}" lay-verify="required" placeholder="请输入标题"
                           class="layui-input"/>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label"><i class="yadmin-red">* </i>作者</label>
                <div class="layui-input-block">
                    <input type="text" name="author" id="add_auth" th:value="${bean?.author}" lay-verify="required" placeholder="请输入作者"
                           class="layui-input"/>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label"><i class="yadmin-red">* </i>封面图</label>
                <div class="layui-input-block">
                    <input type="hidden" name="url" id="pic_url" th:value="${bean?.url}">
                    <div class="layui-upload-drag" id="uploader">
                        <i class="layui-icon layui-icon-upload"></i>
                        <p>点击上传，或将文件拖拽到此处</p>
                    </div>
                    <input type="checkbox" name="showCoverPic" id="showCoverPic" title="封面图片显示在正文中" lay-skin="primary" value="1"/>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">原文链接</label>
                <div class="layui-input-block">
                    <input type="text" name="contentSourceUrl" id="contentSourceUrl" th:value="${bean?.contentSourceUrl}" placeholder="请输入原文链接"
                           class="layui-input"/>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">评论</label>
                <div class="layui-input-block">
                    <div class="layui-col-xs3">
                        <input type="checkbox" id="add_open_comment" name="onlyFansCanComment" value="1" lay-skin="switch" lay-text="开启|关闭"
                               lay-filter="comment" th:checked="${bean?.onlyFansCanComment}"/>
                    </div>
                    <div class="layui-col-xs9" id="add_comment_type" th:styleappend="${bean?.onlyFansCanComment == 1} ? 'display: block' : 'display: none'">
                        <input type="radio" name="needOpenComment" value="0" title="不评论" checked/>
                        <input type="radio" name="needOpenComment" value="1" title="可评论"/>
                    </div>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label"><i class="yadmin-red">* </i>内容</label>
                <div class="layui-input-block">
                    <textarea id="content" name="content" class="layui-textarea" th:text="${bean?.content}" lay-verify="required"
                              lay-vertype="tips"></textarea>
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block layui-align">
                    <button class="layui-btn layui-btn-normal btn-w100" lay-submit lay-filter="submit-form">保存</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    layui.use(['jquery', 'layEditor', "upload", 'form'], function ($, editor, upload, form) {
        editor.init({
            elem: '#content',
            uploadUrl: '/admin/wx/media/upload',
            videoUploadUrl: '/admin/wx/media/upload',
            videoUploadSize: '102400',
        });
        //同步标题
        $("#title").keyup(function () {
            var v = $(this).val();
            $("#thumbTxt").html(v ? v : "请输入标题")
        });
        //开启关闭留言
        form.on('switch(comment)', function (data) {
            if (data.elem.checked) {
                $("#add_comment_type").show();
                $("#add_open_comment").val('1');
            } else {
                $("#add_comment_type").hide();
                $("#add_open_comment").val('0');
            }
        });
        $('input:radio[name=needOpenComment][value="[[${bean?.needOpenComment}]]"]').prop("checked", true);
        form.render('radio');
        //提交
        form.on('submit(submit-form)', function (d) {
            var formData = d.field;
            if (formData.url == "") {
                layer.msg("请上传封面图", {icon: 5});
                return false;
            }
            $.post('/admin/wx/message/save', formData, function (data) {
                advices(data, parent);
            }, 'json').fail(function (event) {
                toError(event);
            });

            return false;
        });
        //上传
        upload.render({
            elem: '#uploader',
            url: '/admin/wx/media/upload',
            data: {type: 'thumb', news: 'mgs'},
            size: 64,
            accept: "images",
            exts: 'JPG|jpg|PNG|png',
            before: function () {
                layer.load(1, {shade: [0.1, '#000']});
            },
            done: function (result) {
                layer.closeAll('loading');
                if (result.mode) {
                    $("#uploader").html("<img src='" + result.data.src + "' style='width: 150px;height: 150px;'/><p>点击重新上传，或将文件拖拽到此处</p>");
                    $("#pic_url").val(result.data.url);
                    $("#mediaId").val(result.data.mediaId);
                    $("#thumbImg").attr("src", result.data.src);
                } else {
                    layer.msg("上传接口异常", {icon: 5});
                }
            },
            error: function (result) {
                layer.closeAll('loading');
                layer.msg(result.msg || "上传接口异常", {icon: 5});
            }
        });
    });
</script>
</body>
</html>
