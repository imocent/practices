<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:include="include :: head('编辑')"></head>
<body style="background-color:#fff">
<div class="yadmin-body animated fadeIn">
    <div class="layui-form layui-form-pane">
        <input type="hidden" name="id" th:value="${bean?.id}"/>
        <input type="hidden" id="msgType" name="msgType" value="text"/>
        <div class="layui-form-item">
            <label for="code" class="layui-form-label"><i class="yadmin-red">* </i>关键字</label>
            <div class="layui-input-block">
                <input type="text" id="code" name="inputCode" th:value="${bean?.inputCode}" class="layui-input"/>
                <p class="layui-bg-red" style="line-height:1.4;padding-left:10px;">如果 关键字 为 subscribe ，那么此消息为订阅消息</p>
            </div>
        </div>
        <div class="layui-form-item">
            <label for="title" class="layui-form-label"><i class="yadmin-red">* </i>标题</label>
            <div class="layui-input-block">
                <input type="text" id="title" name="title" th:value="${bean?.title}" class="layui-input"/>
            </div>
        </div>
        <div class="layui-form-item layui-form-text">
            <label class="layui-form-label"><i class="yadmin-red">* </i>内容</label>
            <div class="layui-input-block">
                <textarea name="content" placeholder="请输入内容" class="layui-textarea" th:text="${bean?.content}"></textarea>
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-input-block layui-align">
                <button class="layui-btn layui-btn-normal btn-w100" lay-submit lay-filter="submit-form">保存</button>
            </div>
        </div>
    </div>
</div>
<script>
    layui.use(['jquery', 'dtree', 'form', 'layer'], function ($, dtree, form, layer) {

        form.on('submit(submit-form)', function (obj) {
            $.post('/admin/wx/message/save', obj.field, function (data) {
                advices(data, parent);
            }, 'json').fail(function (event) {
                toError(event);
            });
        });
    });
</script>
</body>
</html>
