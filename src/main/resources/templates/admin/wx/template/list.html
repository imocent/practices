<!DOCTYPE HTML>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head th:include="include :: head('微信模板消息列表')"></head>
<body>
<div class="layui-card">
    <div class="layui-card-body">
        <div class="yadmin-body animated fadeIn">
            <div class="layui-form yadmin-search-area input">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label for="name" class="layui-form-label">名称</label>
                        <div class="layui-input-inline">
                            <input type="text" name="name" id="name" placeholder="名称" class="layui-input"/>
                        </div>
                        <button lay-submit lay-filter="search" class="layui-btn layui-btn-sm layui-btn-primary table-action">
                            <i class="layui-icon layui-icon-search"></i>
                        </button>
                        <button type="reset" lay-filter="search" class="layui-btn layui-btn-sm layui-btn-primary table-action">
                            <i class="layui-icon layui-icon-refresh"></i>
                        </button>
                    </div>
                    <div class="layui-inline" style="float:right">
                        <button class="layui-btn layui-btn-sm layui-bg-purple" id="batch_sync">
                            <i class="layui-icon">&#xe674; 同步模板</i>
                        </button>
                    </div>
                </div>
            </div>
            <script type="text/html" id="toolbar">
                <button type="button" class="layui-btn layui-btn-xs layui-btn-normal" lay-event="add">
                    <i class="layui-icon layui-icon-addition">新增</i>
                </button>
                <button type="button" class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">
                    <i class="layui-icon layui-icon-delete" title="删除">删除</i>
                </button>
            </script>
            <table class="layui-hide" id="table-list"></table>
            <script type="text/html" id="column-toolbar">
                <button type="button" class="layui-btn layui-btn-normal layui-btn-xs" lay-event="edit">
                    <i class="layui-icon layui-icon-edit" title="编辑">编辑</i>
                </button>
                <button type="button" class="layui-btn layui-btn-warm layui-btn-xs" lay-event="mass">
                    <i class="layui-icon layui-icon-release" title="发送">发送</i>
                </button>
            </script>
        </div>
    </div>
</div>
<script th:inline="none">
    layui.use(['jquery', 'table', 'form', 'layer'], function ($, table, form, layer) {
        table.render({
            elem: '#table-list',
            url: '/admin/wx/template/list',
            method: 'post',
            dataType: 'JSON',
            page: true,
            toolbar: '#toolbar',
            smartReloadModel: true,
            cols: [[
                {type: 'checkbox'},
                {field: 'templateId', title: '模板ID', minWidth: 80},
                {field: 'title', title: '消息标题', minWidth: 80},
                {field: 'content', title: '模板内容', minWidth: 80},
                {fixed: 'right', title: '操作', width: 160, align: 'center', toolbar: '#column-toolbar'}
            ]]
        });

        // 工具条点击事件
        table.on('toolbar', function (obj) {
            if (obj.event === 'add') {
                editView("/admin/wx/template/edit", "添加");
            } else if (obj.event === 'del') {
                layer.confirm('真的删除行么?', function (index) {
                    let selectData = table.checkStatus('table-list').data;
                    if (selectData.length > 0) {
                        let idsArray = [];
                        for (let i = 0; i < selectData.length; i++) {
                            idsArray.push(selectData[i].appid);
                        }
                        let ids = idsArray.toString();
                        deleteReq(ids, '/admin/wx/template/del')
                        layer.close(index);
                    }
                });
            }
        });

        table.on('tool', function (obj) {
            let data = obj.data, event = obj.event;
            if (event === 'edit') {
                editView("/admin/wx/template/edit?id=" + data.id, "编辑");
            } else if (event === 'mass') {
                var pageIndex = openPage({
                    content: '/admin/wx/fans/mass', title: "发送", yes: function (index) {
                        if (GLOBAL.chooses.length === 0) {
                            layer.msg("至少选择1个粉丝");
                            return false;
                        }
                        $.post('/wxapi/sendTemplateMessage', {id: data.id, openIds: GLOBAL.chooses.join(",")}, function (result) {
                            advices(result, pageIndex);
                        }, 'json').fail(function (event) {
                            toError(event);
                        });
                    },
                    end: function () {
                        GLOBAL.chooses = [];
                    }
                });
            }
        });

        form.on('submit(search)', function (form) {
            table.reload('table-list', {
                where: form.field
            });
            return false;
        });

        $("#batch_sync").click(function () {
            layer.confirm('确认同步模板?', {icon: 7, title: "提示", btn: ['确认', '取消']}, function () {
                $.post('/admin/wx/template/syncTemplate', function (data) {
                    advices(data);
                }, 'json').fail(function (event) {
                    layer.msg("同步异常");
                });
            }, function () {
                table.reload('table-list');
                layer.closeAll();
            });
        });
    });
</script>
</body>
</html>
