<!DOCTYPE HTML>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head th:include="include :: head('微信消息列表')"></head>
<body>
<div class="layui-card">
    <div class="layui-card-body">
        <div class="yadmin-body animated fadeIn">
            <div id="add_form" class="layui-form">
                <table id="fans_chose" class="layui-hide" lay-filter="fans_chose"></table>
            </div>
        </div>
    </div>
</div>
<script th:inline="none">
    layui.use(['jquery', 'table', 'form', 'layer'], function ($, table, form, layer) {
        var GLOBAL = {choosed: []};
        var tableObj = table.render({
            id: 'fans_chose',
            elem: '#fans_chose',
            url: '/admin/wx/user/accountFans',
            align: "center",
            cols: [[
                {type: 'checkbox'},
                {type: 'numbers', title: '序号', width: 80},
                {field: 'nickname', title: '昵称', align: 'center'},
                {
                    field: 'headImgUrl', title: '头像', align: 'center', templet: function (d) {
                        return "<img class='fans-portrait' style='width:50px;height:50px;' src=" + d.headImgUrl + " />"
                    }
                },
                {
                    field: 'gender', title: '性别', width: 80, align: 'center', templet: function (d) {
                        return d.gender == 1 ? '男' : '女';
                    }
                },
                {
                    field: 'city', title: '省/市', width: 150, align: 'center', templet: function (d) {
                        return (d.province + '-' + d.city);
                    }
                }
            ]],
            success: function (result) {
                for (var i = 0; i < GLOBAL.choosed.length; i++) {
                    indexOfArray(GLOBAL.choosed, result.data[i].openId) > -1 && (result.data[i].checked = true);
                }
                return result;
            }
        });

        // 选择事件
        table.on('checkbox(fans_chose)', function (obj) {
            if (obj.type === "all") { //全选
                var data = table.cache["fans_chose"] || [];
                if (obj.checked) {
                    for (var i = 0; i < data.length; i++) {
                        GLOBAL.choosed = pushArray(GLOBAL.choosed, data[i].openId);
                    }
                } else {
                    for (var i = 0; i < data.length; i++) {
                        GLOBAL.choosed = removeFromArray(GLOBAL.choosed, data[i].openId);
                    }
                }
            } else { //单选
                if (obj.checked) {
                    GLOBAL.choosed.push(obj.data.openId);
                } else {
                    GLOBAL.choosed = removeFromArray(GLOBAL.choosed, obj.data.openId);
                }
            }
        });
    });
</script>
</body>
</html>
