<!DOCTYPE HTML>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head th:include="include :: head('微信媒体列表')"></head>
<body>
<div class="layui-card">
    <div class="layui-card-body">
        <div class="yadmin-body animated fadeIn">
            <div class="layui-form yadmin-search-area input">
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label for="times" class="layui-form-label">上传日期</label>
                        <div class="layui-input-inline">
                            <input type="text" id="times" name="times" class="layui-input" placeholder="选择上传日期"/>
                        </div>
                        <button lay-submit lay-filter="search" class="layui-btn layui-btn-sm layui-btn-primary table-action">
                            <i class="layui-icon layui-icon-search"></i>
                        </button>
                        <button type="reset" lay-filter="search" class="layui-btn layui-btn-sm layui-btn-primary table-action">
                            <i class="layui-icon layui-icon-refresh"></i>
                        </button>
                    </div>
                    <div class="layui-inline" style="float:right">
                        <button class="layui-btn layui-btn-sm layui-bg-purple" id="batch_sync">
                            <i class="layui-icon">&#xe674; 同步素材</i>
                        </button>
                    </div>
                </div>
            </div>
            <script type="text/html" id="toolbar">
                <button type="button" class="layui-btn layui-bg-purple layui-btn-xs" lay-event="video">
                    <i class="layui-icon layui-icon-video"> 视频</i>
                </button>
                <button type="button" class="layui-btn layui-bg-blue layui-btn-xs" id="upload">
                    <i class="layui-icon layui-icon-upload-circle"> 文件</i>
                </button>
            </script>
            <table class="layui-hide" id="table-list"></table>
            <script type="text/html" id="column-toolbar">
                <button type="button" class="layui-btn layui-btn-normal layui-btn-xs" lay-event="eye">
                    <i class="layui-icon layui-icon-eye" title="预览"> 预览</i>
                </button>
                <button type="button" class="layui-btn layui-btn-normal layui-btn-xs" lay-event="down">
                    <i class="layui-icon layui-icon-download-circle" title="下载"> 下载</i>
                </button>
                <button type="button" class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">
                    <i class="layui-icon layui-icon-delete" title="删除"> 删除</i>
                </button>
            </script>
        </div>
    </div>
</div>
<script th:inline="none">
    layui.use(['jquery', 'table', 'form', 'layer', "laydate", "upload"], function ($, table, form, layer, laydate, upload) {
        table.render({
            elem: '#table-list',
            url: '/admin/wx/media/list',
            method: 'post',
            dataType: 'JSON',
            page: true,
            toolbar: '#toolbar',
            smartReloadModel: true,
            cols: [[
                {field: 'fileName', title: '存放名称', minWidth: 80},
                {field: 'realname', title: '原始名称', minWidth: 80},
                {field: 'account', title: '公众号', width: 150},
                {field: 'mediaType', title: '类型', width: 80},
                {field: 'createTime', title: '上传时间', width: 170},
                {field: 'title', title: '标题', minWidth: 80},
                {field: 'introduction', title: '说明', minWidth: 80},
                {fixed: 'right', title: '操作', width: 240, align: 'center', toolbar: '#column-toolbar'}
            ]]
        });

        // 工具条点击事件
        table.on('toolbar', function (obj) {
            if (obj.event == 'video') {
                openFull("/admin/wx/media/video", "添加视频");
            }
        });

        table.on('tool', function (obj) {
            let data = obj.data, event = obj.event;
            if (event == 'eye') {
                openFull("/admin/wx/media/view?id=" + data.id, "预览");
            } else if (obj.event == 'down') {
                layer.confirm('确定要下载吗？', {icon: 3, title: '下载确认'}, function (index) {
                    downloadFile(data.url, data.filename);
                    layer.close(index);
                });
            } else if (obj.event == 'del') {
                layer.confirm('真的删除行么?', function (index) {
                    let selectData = table.checkStatus('table-list').data;
                    if (selectData.length == 0) {
                        selectData.push(data);
                    }
                    let idsArray = [];
                    for (let i = 0; i < selectData.length; i++) {
                        idsArray.push(selectData[i].id);
                    }
                    let ids = idsArray.toString();
                    deleteReq(ids, '/admin/wx/media/del')
                    layer.close(index);
                });
            }
        });

        form.on('submit(search)', function (form) {
            table.reload('table-list', {
                where: form.field
            });
            return false;
        });

        $("#batch_sync").click(function () {
            layer.confirm('确认同步素材?', {icon: 7, title: "提示", btn: ['确认', '取消']}, function () {
                $.post('/admin/wx/media/syncMaterial', function (data) {
                    advices(data);
                    setTimeout(function () {
                        table.reload('table-list');
                    }, 30000);
                }, 'json').fail(function (event) {
                    layer.msg("同步异常");
                });
            }, function () {
                table.reload('table-list');
                layer.closeAll();
            });
        });

        function downloadFile(url, filename) {
            // 对于图片、视频、音频，可以尝试直接预览或下载
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.responseType = 'blob';
            xhr.onload = function () {
                if (this.status == 200) {
                    var link = document.createElement('a');
                    var blobUrl = URL.createObjectURL(this.response);
                    link.href = blobUrl;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(blobUrl);
                    layer.msg('下载成功：' + filename, {icon: 1, time: 1500});
                } else {
                    layer.msg('下载失败，请重试', {icon: 2});
                }
            };

            xhr.onerror = function () {
                // 如果 XHR 失败，尝试使用 a 标签直接下载
                var link = document.createElement('a');
                link.href = url;
                link.download = filename;
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                layer.msg('正在下载：' + filename, {icon: 1, time: 1500});
            };

            xhr.send();
        }


        let currentUploadInst = null;

        // 封装初始化函数
        function initUploadComponent() {
            // 如果已存在实例，先解绑事件
            if (currentUploadInst) {
                $('#upload').off('change'); // 解绑change事件
                $('#upload').next('.layui-btn').off('click'); // 解绑按钮点击事件
            }

            // 重新初始化
            currentUploadInst = upload.render({
                accept: 'file',
                elem: '#upload',
                exts: 'jpg|png|gif|bmp|jpeg|mp4|amr|mp3|m4a|txt',
                url: '/admin/wx/media/uploadAsset',
                size: 20480,
                before: function () {
                    layer.load(1, {shade: [0.1, '#000']});
                },
                done: function (res) {
                    layer.closeAll('loading');
                    if (res.mode) {
                        layer.msg("上传成功");
                        table.reload('table-list');
                        setTimeout(function () {
                            initUploadComponent();
                        }, 100);
                    } else {
                        layer.msg("上传失败: " + res.msg);
                        setTimeout(function () {
                            initUploadComponent();
                        }, 100);
                    }
                },
                error: function () {
                    layer.closeAll('loading');
                    layer.msg("上传失败");
                    setTimeout(function () {
                        initUploadComponent();
                    }, 100);
                }
            });
        }

        initUploadComponent();

        laydate.render({
            elem: '#times',
        });
    });
</script>
</body>
</html>
